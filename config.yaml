# DNS Proxy Configuration Example
#
# This file demonstrates the configuration options for the DNS proxy.
# The proxy routes DNS queries based on their opcode to processing modules,
# and forwards all other opcodes to upstream resolvers.
#
# Protocol-Specific Routing:
# - UPDATE queries WITH UPDATE-LEASE EDNS option (RFC 9664) are handled by sig0lease handler
# - UPDATE queries WITHOUT UPDATE-LEASE EDNS option are forwarded to default upstream resolver
# - This allows the proxy to distinguish sig0lease registration requests from standard RFC 2136 updates

server:
  # Address to listen on (port 8053 by default - non-privileged)
  # For standard DNS, use :53 but requires root privileges
  address: ":8053"

  # Networks to enable
  networks:
    - udp
    - tcp

upstreams:
  # Primary upstream resolver (authoritative server at dev.zenr.io)
  - address: "dev.zenr.io:53"
    protocol: "udp"
    timeout: "5s"

  # Secondary upstream resolver (used as fallback)
  - address: "8.8.8.8:53"
    protocol: "udp"
    timeout: "5s"

# Phase 1 Handler Configuration for SIG(0) Registration Requests
# Proxy acts as intermediary between downstream client and upstream authoritative server
handlers:
  update:
    # Downstream zone (zone from which clients send Registration Requests)
    # Phase 1: Proxy receives requests to this zone from clients using Downstream SIG(0) key
    downstream_zone: "test.dev.zenr.io."

    # Upstream zone (authoritative zone where actual registrations happen)
    # Phase 1: Proxy forwards validated requests to this zone using Upstream SIG(0) key
    upstream_zone: "dev.zenr.io."

    # Keystore directory containing DNSSEC keys in sig0namectl format
    # Keys must be named: Kzone.+015+keytag.key and Kzone.+015+keytag.private
    # Points to the shared sig0namectl keystore at workspace root level
    keystore_dir: "../sig0namectl/keystore"

# Processing rules map opcodes to module names
processing_rules:
  # Route opcode 2 (STATUS) to a status processor module
  # Modules must be registered in cmd/sig0lease_proxy/main.go to handle this opcode
  - opcode: 2
    module: "status_handler"

  # Route opcode 5 (UPDATE) to an update handler module
  # UPDATE queries are used for dynamic DNS updates (RFC 2136)
  - opcode: 5
    module: "update_handler"

# Default forward is used for opcodes not listed in processing_rules
default_forward: "127.0.0.1:53"

